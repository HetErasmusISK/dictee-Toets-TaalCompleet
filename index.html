<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaalCompleet A1 - Cijferadministratie</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Fredoka', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }
    .grade-input { transition: all 0.3s ease; }
    .grade-input:focus { transform: scale(1.05); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    .student-row { animation: slideIn 0.5s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .card-shadow {
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.1), 
                  0 2px 4px -1px rgba(99, 102, 241, 0.06),
                  0 0 0 1px rgba(99, 102, 241, 0.05);
    }
    .header-accent {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ============================================
    // FIREBASE CONFIGURATIE - VUL HIER JE GEGEVENS IN
    // ============================================
    const firebaseConfig = {
      apiKey: "{JE_API_KEY}",
      authDomain: "{JE_PROJECT_ID}.firebaseapp.com",
      projectId: "{JE_PROJECT_ID}",
      storageBucket: "{JE_PROJECT_ID}.appspot.com",
      messagingSenderId: "{JE_SENDER_ID}",
      appId: "{JE_APP_ID}"
    };
    
    const APP_PASSWORD = 'ISK2026!';
    // ============================================

    // Initialize Firebase
    let db;
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    } catch (error) {
      console.error("Firebase init error:", error);
    }

    // Icons
    const Upload = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
    );

    const Download = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
    );

    const Plus = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    );

    const Trash2 = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <line x1="10" y1="11" x2="10" y2="17"></line>
        <line x1="14" y1="11" x2="14" y2="17"></line>
      </svg>
    );

    const Calculator = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="4" y="2" width="16" height="20" rx="2"></rect>
        <line x1="8" y1="6" x2="16" y2="6"></line>
        <line x1="16" y1="14" x2="16" y2="18"></line>
        <path d="M16 10h.01"></path>
        <path d="M12 10h.01"></path>
        <path d="M8 10h.01"></path>
        <path d="M12 14h.01"></path>
        <path d="M8 14h.01"></path>
        <path d="M12 18h.01"></path>
        <path d="M8 18h.01"></path>
      </svg>
    );

    const Edit2 = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    );

    const Check = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    );

    const X = ({ className }) => (
      <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    );

    function ToetscijfersApp() {
      const [students, setStudents] = useState([]);
      const [grades, setGrades] = useState({});
      const [showImport, setShowImport] = useState(false);
      const [importText, setImportText] = useState('');
      const [newStudentName, setNewStudentName] = useState('');
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [loading, setLoading] = useState(true);
      const [editingId, setEditingId] = useState(null);
      const [editingName, setEditingName] = useState('');

      const themes = ['Thema 1', 'Thema 2', 'Thema 3', 'Thema 4', 'Thema 5', 'Thema 6', 'Thema 7', 'Thema 8'];

      useEffect(() => {
        const authStatus = sessionStorage.getItem('taalcompleet-auth');
        if (authStatus === 'true') {
          setIsAuthenticated(true);
        }
        setLoading(false);
      }, []);

      const handleLogin = (e) => {
        e.preventDefault();
        if (passwordInput === APP_PASSWORD) {
          setIsAuthenticated(true);
          sessionStorage.setItem('taalcompleet-auth', 'true');
          setPasswordInput('');
        } else {
          alert('Onjuist wachtwoord!');
          setPasswordInput('');
        }
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        sessionStorage.removeItem('taalcompleet-auth');
      };

      useEffect(() => {
        if (!isAuthenticated || !db) return;
        
        const unsubscribe = db.collection('taalcompleet').doc('cijfers').onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            if (data.students) {
              const sorted = [...data.students].sort((a, b) => a.name.localeCompare(b.name, 'nl'));
              setStudents(sorted);
            }
            if (data.grades) setGrades(data.grades);
          }
        });
        
        return () => unsubscribe();
      }, [isAuthenticated]);

      const saveToFirebase = async (newStudents, newGrades) => {
        if (!db) return;
        try {
          await db.collection('taalcompleet').doc('cijfers').set({
            students: newStudents,
            grades: newGrades,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch (error) {
          console.error('Error saving:', error);
          alert('Fout bij opslaan: ' + error.message);
        }
      };

      const addStudent = () => {
        if (newStudentName.trim() && students.length < 18) {
          const newStudents = [...students, { id: Date.now(), name: newStudentName.trim() }];
          newStudents.sort((a, b) => a.name.localeCompare(b.name, 'nl'));
          setStudents(newStudents);
          saveToFirebase(newStudents, grades);
          setNewStudentName('');
        }
      };

      const removeStudent = (studentId) => {
        const newStudents = students.filter(s => s.id !== studentId);
        const newGrades = { ...grades };
        delete newGrades[studentId];
        setStudents(newStudents);
        setGrades(newGrades);
        saveToFirebase(newStudents, newGrades);
      };

      const startEditing = (student) => {
        setEditingId(student.id);
        setEditingName(student.name);
      };

      const cancelEditing = () => {
        setEditingId(null);
        setEditingName('');
      };

      const saveEditedName = () => {
        if (!editingName.trim()) {
          cancelEditing();
          return;
        }
        
        const newStudents = students.map(s => 
          s.id === editingId ? { ...s, name: editingName.trim() } : s
        );
        newStudents.sort((a, b) => a.name.localeCompare(b.name, 'nl'));
        setStudents(newStudents);
        saveToFirebase(newStudents, grades);
        setEditingId(null);
        setEditingName('');
      };

      const importStudents = () => {
        const names = importText.split('\n').map(n => n.trim()).filter(n => n.length > 0).slice(0, 18);
        const newStudents = names.map((name, i) => ({ id: Date.now() + i, name }));
        newStudents.sort((a, b) => a.name.localeCompare(b.name, 'nl'));
        setStudents(newStudents);
        saveToFirebase(newStudents, grades);
        setImportText('');
        setShowImport(false);
      };

      const updateGrade = (studentId, themeIndex, value) => {
        const newGrades = { ...grades };
        if (!newGrades[studentId]) newGrades[studentId] = {};
        
        const gradeValue = value === '' ? null : parseFloat(value);
        
        if (gradeValue === null) {
          delete newGrades[studentId][themeIndex];
        } else if (gradeValue >= 1 && gradeValue <= 10) {
          const today = new Date().toLocaleDateString('nl-NL');
          newGrades[studentId][themeIndex] = {
            grade: gradeValue,
            date: newGrades[studentId][themeIndex]?.date || today
          };
        }
        
        setGrades(newGrades);
        saveToFirebase(students, newGrades);
      };

      const getGradePeriod = (dateString) => {
        const parts = dateString.split('-');
        if (parts.length !== 3) return 1;
        const month = parseInt(parts[1]);
        return (month >= 9 || month <= 1) ? 1 : 2;
      };

      const calculateAverage = (studentId, period) => {
        if (!grades[studentId]) return '-';
        const studentGrades = Object.values(grades[studentId]).filter(g => g && g.grade && g.date);
        if (studentGrades.length === 0) return '-';
        
        const filteredGrades = studentGrades.filter(g => getGradePeriod(g.date) === period);
        if (filteredGrades.length === 0) return '-';
        
        const sum = filteredGrades.reduce((acc, g) => acc + g.grade, 0);
        return (sum / filteredGrades.length).toFixed(1);
      };

      const exportData = () => {
        const data = { students, grades, exportDate: new Date().toLocaleDateString('nl-NL') };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `toetscijfers-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
      };

      const importJSON = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            
            if (data.students && data.grades) {
              const sortedStudents = [...data.students].sort((a, b) => a.name.localeCompare(b.name, 'nl'));
              setStudents(sortedStudents);
              setGrades(data.grades);
              saveToFirebase(sortedStudents, data.grades);
              alert('Data succesvol geïmporteerd!');
            } else {
              alert('Ongeldig bestand formaat!');
            }
          } catch (error) {
            alert('Fout bij importeren: ' + error.message);
          }
        };
        reader.readAsText(file);
      };

      if (loading) return <div className="min-h-screen flex items-center justify-center">Laden...</div>;

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl card-shadow p-8 w-full max-w-md">
              <div className="text-center mb-8">
                <div className="w-16 h-16 bg-gradient-to-br from-green-400 to-blue-500 rounded-xl flex items-center justify-center text-white text-2xl font-bold shadow-lg mx-auto mb-4">TC</div>
                <h1 className="text-3xl font-bold header-accent">TaalCompleet A1</h1>
                <p className="text-gray-600 mt-2">Cijferadministratie</p>
              </div>
              
              <form onSubmit={handleLogin} className="space-y-6">
                <div>
                  <label className="block text-gray-700 font-medium mb-2">Wachtwoord</label>
                  <input
                    type="password"
                    value={passwordInput}
                    onChange={(e) => setPasswordInput(e.target.value)}
                    className="w-full border-2 border-indigo-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500"
                    placeholder="Voer wachtwoord in"
                    autoFocus
                  />
                </div>
                
                <button type="submit" className="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 font-medium text-lg">
                  Inloggen
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 p-4 md:p-8">
          <div className="max-w-7xl mx-auto">
            <div className="bg-white rounded-3xl card-shadow p-6 md:p-8 mb-6">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div className="flex items-center gap-4">
                  <div className="w-16 h-16 bg-gradient-to-br from-green-400 to-blue-500 rounded-xl flex items-center justify-center text-white text-2xl font-bold shadow-lg">TC</div>
                  <div>
                    <h1 className="text-4xl md:text-5xl font-bold header-accent mb-2">TaalCompleet A1</h1>
                    <p className="text-gray-600 text-lg">Bijhouden van cijfers voor {students.length} leerlingen</p>
                  </div>
                </div>
                
                <div className="flex gap-2 flex-wrap">
                  <label className="flex items-center gap-2 bg-green-600 text-white px-4 py-3 rounded-xl hover:bg-green-700 font-medium cursor-pointer">
                    <Upload className="w-4 h-4" />
                    Import JSON
                    <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                  </label>
                  <button onClick={() => setShowImport(!showImport)} className="flex items-center gap-2 bg-indigo-600 text-white px-4 py-3 rounded-xl hover:bg-indigo-700 font-medium">
                    <Upload className="w-4 h-4" />
                    Importeer Namen
                  </button>
                  <button onClick={exportData} className="flex items-center gap-2 bg-purple-600 text-white px-4 py-3 rounded-xl hover:bg-purple-700 font-medium">
                    <Download className="w-4 h-4" />
                    Exporteer
                  </button>
                  <button onClick={handleLogout} className="text-gray-600 hover:text-gray-800 px-4 py-3">
                    Uitloggen
                  </button>
                </div>
              </div>
            </div>

            {showImport && (
              <div className="bg-white rounded-3xl card-shadow p-6 mb-6">
                <h3 className="text-xl font-bold mb-4">Leerlingen importeren</h3>
                <textarea value={importText} onChange={(e) => setImportText(e.target.value)} className="w-full border-2 border-indigo-200 rounded-xl p-4 mb-4" rows="8" placeholder="Naam per regel..." />
                <div className="flex gap-2">
                  <button onClick={importStudents} className="bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700">Importeer</button>
                  <button onClick={() => setShowImport(false)} className="bg-gray-200 px-6 py-3 rounded-xl">Annuleer</button>
                </div>
              </div>
            )}

            <div className="bg-white rounded-3xl card-shadow p-6 mb-6">
              <h3 className="text-xl font-bold mb-4">Leerling toevoegen</h3>
              <div className="flex gap-2">
                <input type="text" value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && addStudent()} placeholder="Naam leerling" className="flex-1 border-2 border-indigo-200 rounded-xl px-4 py-3" disabled={students.length >= 18} />
                <button onClick={addStudent} disabled={students.length >= 18} className="flex items-center gap-2 bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700 disabled:bg-gray-300">
                  <Plus className="w-4 h-4" />
                  Toevoegen
                </button>
              </div>
            </div>

            {students.length > 0 && (
              <div className="bg-white rounded-3xl card-shadow p-6 overflow-x-auto">
                <div className="flex items-center gap-2 mb-6">
                  <Calculator className="w-6 h-6 text-indigo-600" />
                  <h3 className="text-2xl font-bold">Cijferoverzicht</h3>
                </div>
                
                <table className="w-full border-collapse">
                  <thead>
                    <tr className="border-b-2 border-indigo-200">
                      <th className="text-left p-2 font-bold sticky left-0 bg-white z-20">Naam</th>
                      {themes.map((theme, i) => <th key={i} className="p-2 text-center font-bold text-sm">{theme}</th>)}
                      <th className="p-2 text-center font-bold text-indigo-700 bg-indigo-50"><div className="text-sm">Per. 1/2</div><div className="text-xs font-normal text-gray-500">sep-jan</div></th>
                      <th className="p-2 text-center font-bold text-purple-700 bg-purple-50"><div className="text-sm">Per. 3/4</div><div className="text-xs font-normal text-gray-500">feb-aug</div></th>
                      <th className="p-2"><Trash2 className="w-3 h-3 mx-auto text-gray-400" /></th>
                    </tr>
                  </thead>
                  <tbody>
                    {students.map((student) => (
                      <tr key={student.id} className="border-b hover:bg-indigo-50">
                        <td className="p-2 font-medium text-sm sticky left-0 bg-white z-10">
                          {editingId === student.id ? (
                            <div className="flex gap-2 items-center">
                              <input
                                type="text"
                                value={editingName}
                                onChange={(e) => setEditingName(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && saveEditedName()}
                                className="border-2 border-indigo-500 rounded px-2 py-1 flex-1"
                                autoFocus
                              />
                              <button onClick={saveEditedName} className="text-green-600 hover:bg-green-50 p-1 rounded">
                                <Check className="w-4 h-4" />
                              </button>
                              <button onClick={cancelEditing} className="text-gray-600 hover:bg-gray-50 p-1 rounded">
                                <X className="w-4 h-4" />
                              </button>
                            </div>
                          ) : (
                            <div className="flex gap-2 items-center group">
                              <span>{student.name}</span>
                              <button onClick={() => startEditing(student)} className="opacity-0 group-hover:opacity-100 text-blue-600 hover:bg-blue-50 p-1 rounded transition-opacity">
                                <Edit2 className="w-3.5 h-3.5" />
                              </button>
                            </div>
                          )}
                        </td>
                        {themes.map((theme, i) => {
                          const gradeData = grades[student.id]?.[i];
                          return (
                            <td key={i} className="p-1">
                              <div className="flex flex-col items-center gap-1">
                                <input type="number" min="1" max="10" step="0.1" value={gradeData?.grade || ''} onChange={(e) => updateGrade(student.id, i, e.target.value)} className="w-16 text-center border-2 border-gray-200 rounded-lg px-1 py-1.5 font-bold mono text-sm grade-input" placeholder="-" />
                                {gradeData?.date && <span className="text-xs text-gray-500 mono">{gradeData.date}</span>}
                              </div>
                            </td>
                          );
                        })}
                        <td className="p-2 text-center bg-indigo-50"><div className="text-xl font-bold text-indigo-700 mono">{calculateAverage(student.id, 1)}</div></td>
                        <td className="p-2 text-center bg-purple-50"><div className="text-xl font-bold text-purple-700 mono">{calculateAverage(student.id, 2)}</div></td>
                        <td className="p-2 text-center"><button onClick={() => removeStudent(student.id)} className="text-red-600 hover:bg-red-50 p-1.5 rounded-lg"><Trash2 className="w-3.5 h-3.5" /></button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {students.length === 0 && (
              <div className="bg-white rounded-3xl card-shadow p-12 text-center">
                <div className="text-6xl mb-4">📚</div>
                <h3 className="text-2xl font-bold mb-2">Nog geen leerlingen</h3>
                <p className="text-gray-600">Voeg leerlingen toe of importeer een lijst</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<ToetscijfersApp />, document.getElementById('root'));
  </script>
</body>
</html>
